<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inclura Dashboard</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#071120;
  color:white;
  font-family:Arial,sans-serif;
}

.wrapper{
  display:flex;
  min-height:100vh;
}

.sidebar{
  width:260px;
  background:#0b1730;
  padding:20px;
}

.logo{
  font-size:32px;
  font-weight:bold;
  margin-bottom:30px;
}

.menu a{
  display:block;
  color:white;
  text-decoration:none;
  padding:14px;
  margin-bottom:10px;
  background:#13213d;
  border-radius:10px;
}

.main{
  flex:1;
  padding:20px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-top:20px;
}

.card{
  background:#13213d;
  padding:25px;
  border-radius:14px;
}

.icon{
  font-size:40px;
  margin-bottom:10px;
}

@media(max-width:900px){

  .wrapper{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
  }

}

</style>
</head>

<body>

<div class="wrapper">

<div class="sidebar">

<div class="logo">
Inclura
</div>

<div class="menu">

<a href="#">🏠 Dashboard</a>

<a href="#">👥 Friends</a>

<a href="#">🎥 Reels</a>

<a href="#">💬 Messages</a>

<a href="#">⚙ Settings</a>

</div>

</div>

<div class="main">

<h1>Welcome to Inclura</h1>

<p>Your dashboard is now working.</p>

<div class="cards">

<div class="card">
<div class="icon">📊</div>
<h2>Analytics</h2>
</div>

<div class="card">
<div class="icon">📁</div>
<h2>Files</h2>
</div>

<div class="card">
<div class="icon">🔔</div>
<h2>Notifications</h2>
</div>

<div class="card">
<div class="icon">💰</div>
<h2>Wallet</h2>
</div>

</div>

</div>

</div>

</body>
</html>
